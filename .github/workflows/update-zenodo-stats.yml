name: Update Zenodo statistics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-zenodo-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Collect Zenodo statistics
        run: python scripts/collect_zenodo_stats.py

      - name: Commit updated Zenodo statistics
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Zenodo statistics"
          file_pattern: data/zenodo/zenodo_records.csv data/zenodo/zenodo_records.json data/zenodo/zenodo_records.md data/zenodo/history.csv data/zenodo/categories.json zenodo-stats.html
