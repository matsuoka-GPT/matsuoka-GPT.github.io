name: Update Papers List

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch Zenodo Records
        run: |
          # 検索クエリをより確実に（q=... をシンプルにし、二重引用符をURLエンコード）
          curl -s "https://zenodo.org/api/records/?q=creators.name:%22Matsuoka,%20Takafumi%22&sort=mostrecent&size=50" > zenodo.json
          # デバッグ用：中身が空でないか確認
          cat zenodo.json

      - name: Generate papers list
        run: |
          echo "<ul>" > papers_list.html
          # 1. JSONが有効か 2. ヒット件数が0より大きいか を厳格にチェック
          COUNT=$(jq '.hits.total // 0' zenodo.json)
          
          if [ "$COUNT" -gt 0 ]; then
            # ヒットがある場合のみ処理
            jq -r '.hits.hits[] | "<li><strong>" + .metadata.title + "</strong><br>DOI: <a href=\"https://doi.org/" + .doi + "\">" + .doi + "</a><br>Published: " + .metadata.publication_date + "</li>"' zenodo.json >> papers_list.html
          else
            # ヒットがない場合
            echo "<li>現在、表示できる論文データが見つかりません。 (Total: $COUNT)</li>" >> papers_list.html
          fi
          echo "</ul>" >> papers_list.html

      - name: Insert into papers.html
        run: |
          awk '
            /AUTO-GENERATED-CONTENT:START/ {print; system("cat papers_list.html"); skip=1; next}
            /AUTO-GENERATED-CONTENT:END/ {skip=0}
            skip==0 {print}
          ' papers.html > papers_new.html
          mv papers_new.html papers.html

      - name: Commit changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add papers.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update papers list" && git push)
