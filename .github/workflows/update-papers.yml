name: Update Papers List

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch Zenodo Records
        run: |
          # URL全体をシングルクォートで囲み、スペースなどの誤認を防ぎます
          curl -s 'https://zenodo.org/api/records/?q=creators.name:"Takafumi+Matsuoka"&sort=mostrecent&size=50' > zenodo.json
          # 取得したファイルが空でないか、JSONとして正しいかデバッグ表示（Actionsのログで確認用）
          cat zenodo.json

      - name: Generate papers list
        run: |
          echo "<ul>" > papers_list.html
          # jqがエラーで止まらないように、念のため入力チェックを追加
          if jq -e . zenodo.json >/dev/null 2>&1; then
            cat zenodo.json | jq -r '.hits.hits[] | "<li><strong>" + .metadata.title + "</strong><br>DOI: <a href=\"https://doi.org/" + .doi + "\">" + .doi + "</a><br>Published: " + .metadata.publication_date + "</li>"' >> papers_list.html
          else
            echo "<li>論文データが取得できませんでした。</li>" >> papers_list.html
          fi
          echo "</ul>" >> papers_list.html

      - name: Insert into papers.html
        run: |
          awk '
            /AUTO-GENERATED-CONTENT:START/ {print; system("cat papers_list.html"); skip=1; next}
            /AUTO-GENERATED-CONTENT:END/ {skip=0}
            skip==0 {print}
          ' papers.html > papers_new.html
          mv papers_new.html papers.html

      - name: Commit changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add papers.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update papers list" && git push)
