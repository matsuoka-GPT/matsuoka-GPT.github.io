name: Update Papers List

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

                  - name: Fetch Zenodo Records
        run: |
          curl -L -s \
            -H "Accept: application/json" \
            -H "User-Agent: Mozilla/5.0" \
            --get 'https://zenodo.org/api/records' \
            --data-urlencode 'q=0009-0003-1530-4234' \
            --data-urlencode 'sort=mostrecent' \
            --data-urlencode 'size=50' \
            -o zenodo.json

          echo "--- API Response Preview ---"
          head -c 1000 zenodo.json
          echo
          echo "--- Total hits ---"
          jq '.hits.total // .hits.total.value // "unknown"' zenodo.json || true

      - name: Generate papers list
        run: |
          echo "<ul>" > papers_list.html

          if jq -e '.hits.hits and (.hits.hits | length > 0)' zenodo.json >/dev/null 2>&1; then
            jq -r '
              .hits.hits[] |
              "<li><strong>" +
              (.metadata.title // "Untitled") +
              "</strong><br>DOI: <a href=\"https://doi.org/" +
              (.doi // "") +
              "\">" +
              (.doi // "No DOI") +
              "</a><br>Published: " +
              (.metadata.publication_date // "Unknown") +
              "</li>"
            ' zenodo.json >> papers_list.html
          else
            echo "<li>現在、論文リストを読み込めません。Zenodoのサイトを確認してください。</li>" >> papers_list.html
          fi

          echo "</ul>" >> papers_list.html

      - name: Insert into papers.html
        run: |
          if [ ! -f papers.html ]; then
            echo '<!DOCTYPE html><html lang="ja"><body><!-- AUTO-GENERATED-CONTENT:START --><!-- AUTO-GENERATED-CONTENT:END --></body></html>' > papers.html
          fi

          awk '
            /AUTO-GENERATED-CONTENT:START/ {
              print
              system("cat papers_list.html")
              skip=1
              next
            }
            /AUTO-GENERATED-CONTENT:END/ {
              skip=0
            }
            skip==0 {
              print
            }
          ' papers.html > papers_new.html

          mv papers_new.html papers.html

      - name: Debug generated files
        run: |
          echo "--- papers_list.html ---"
          cat papers_list.html
          echo
          echo "--- papers.html after insert ---"
          head -n 120 papers.html

      - name: Commit changes
  run: |
    git config --local user.email "actions@github.com"
    git config --local user.name "GitHub Actions"

    git add papers.html

    if ! git diff --cached --exit-code; then
      git commit -m "Update papers list"

      # ★これを追加
      git pull --rebase origin main

      git push origin main
    else
      echo "No changes to commit."
    fi
