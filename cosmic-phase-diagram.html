<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Phase Diagram</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    height: 100%;
    overflow: hidden;
  }

  #container {
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: relative;
    touch-action: none;
  }

  #diagram {
    position: absolute;
    top: 50%;
    left: 50%;
    transform-origin: center center;
    cursor: zoom-in;
    user-select: none;
    -webkit-user-drag: none;
  }
</style>
</head>
<body>

<div id="container">
  <img src="images/cosmic-phase-diagram-2.png" id="diagram">
</div>

<script>
  const img = document.getElementById('diagram');
  const container = document.getElementById('container');

  let scale = 1;
  let isZoomed = false;
  let originX = 0;
  let originY = 0;
  let offsetX = 0;
  let offsetY = 0;
  let dragging = false;
  let startX = 0;
  let startY = 0;

  function fitToScreen() {
    const naturalRatio = img.naturalWidth / img.naturalHeight;
    const containerRatio = container.clientWidth / container.clientHeight;

    if (naturalRatio > containerRatio) {
      scale = container.clientWidth / img.naturalWidth;
    } else {
      scale = container.clientHeight / img.naturalHeight;
    }

    offsetX = 0;
    offsetY = 0;
    img.style.transform = `translate(-50%, -50%) scale(${scale})`;
    img.style.cursor = "zoom-in";
    isZoomed = false;
  }

  img.onload = fitToScreen;
  window.onresize = fitToScreen;

  img.addEventListener('click', (e) => {
    if (!isZoomed) {
      const rect = img.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const clickY = e.clientY - rect.top;

      scale = 1; // 等倍に固定

      originX = (container.clientWidth / 2) - (clickX * zoomFactor);
      originY = (container.clientHeight / 2) - (clickY * zoomFactor);

      scale = zoomFactor;
      offsetX = originX;
      offsetY = originY;

      img.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
      img.style.cursor = "zoom-out";
      isZoomed = true;
    } else {
      fitToScreen();
    }
  });

  container.addEventListener('mousedown', (e) => {
    if (!isZoomed) return;
    dragging = true;
    startX = e.clientX - offsetX;
    startY = e.clientY - offsetY;
  });

  window.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    offsetX = e.clientX - startX;
    offsetY = e.clientY - startY;
    img.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
  });

  window.addEventListener('mouseup', () => dragging = false);

  container.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;

    const rect = img.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;

    const prevScale = scale;
    scale *= delta;

    offsetX -= (mouseX * (scale - prevScale));
    offsetY -= (mouseY * (scale - prevScale));

    img.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
    isZoomed = true;
    img.style.cursor = "zoom-out";
  }, { passive: false });
</script>

</body>
</html>
