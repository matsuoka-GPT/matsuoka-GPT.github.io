<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Phase Diagram</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    height: 100%;
    overflow: hidden;
  }

  img {
    position: absolute;
    top: 50%;
    left: 50%;
    height: 100vh;   /* 横画面・PCでは縦フィット */
    width: auto;
    transform: translate(-50%, -50%);
  }

  /* 📱 縦画面のときだけ横幅フィット */
  @media screen and (orientation: portrait) {
    img {
      width: 100vw;   /* 横幅いっぱい */
      height: auto;   /* 比率維持 */
    }
  }
</style>
</head>
<body>

<img src="images/cosmic-phase-diagram-2.png" alt="Cosmic Phase Diagram">

</body>
</html>
