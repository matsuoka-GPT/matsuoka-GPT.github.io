<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Phase Diagram</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    height: 100%;
    overflow: hidden;
  }

  #container {
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: relative;
    touch-action: none;
  }

  #diagram {
    position: absolute;
    top: 50%;
    left: 50%;
    max-height: 100vh;
    width: auto;
    transform: translate(-50%, -50%) scale(1);
    cursor: zoom-in;
    transition: transform 0.2s ease;
    user-select: none;
  }
</style>
</head>
<body>

<div id="container">
  <img src="images/cosmic-phase-diagram-2.png" id="diagram">
</div>

<script>
  const img = document.getElementById('diagram');
  const container = document.getElementById('container');

  let zoomed = false;
  let scale = 1;
  let offsetX = -50;  // translate(-50%, -50%) と整合
  let offsetY = -50;

  let dragging = false;
  let startX = 0;
  let startY = 0;

  // クリックでズーム
img.addEventListener('dblclick', (e) => {
  e.preventDefault(); // ブラウザのデフォルト動作を無効化

  if (!isZoomed) {
    // 現在の画像の表示サイズを取得
    const rect = img.getBoundingClientRect();

    // ダブルクリック位置（画像内座標）
    const clickX = e.clientX - rect.left;
    const clickY = e.clientY - rect.top;

    // 等倍にする
    scale = 1;

    // 等倍時の画像内座標（自然サイズ基準）
    const naturalX = clickX / fitScale;
    const naturalY = clickY / fitScale;

    // クリック位置を画面中央に持ってくるためのオフセット
    offsetX = (container.clientWidth / 2) - naturalX;
    offsetY = (container.clientHeight / 2) - naturalY;

    img.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
    img.style.cursor = "zoom-out";
    isZoomed = true;

  } else {
    // フィットに戻す
    fitToScreen();
  }
});



  // ドラッグ開始
  container.addEventListener('mousedown', (e) => {
    if (!zoomed) return;
    dragging = true;
    startX = e.clientX - offsetX;
    startY = e.clientY - offsetY;
  });

  // ドラッグ中
  window.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    offsetX = e.clientX - startX;
    offsetY = e.clientY - startY;
    img.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
  });

  // ドラッグ終了
  window.addEventListener('mouseup', () => {
    dragging = false;
  });
</script>

</body>
</html>
