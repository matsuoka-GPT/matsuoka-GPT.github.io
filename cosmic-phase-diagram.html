<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Phase Diagram</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    height: 100%;
    overflow: hidden;
  }

  /* 画像を縮小表示（画面にフィット） */
  img {
    position: absolute;
    top: 50%;
    left: 50%;
    max-height: 100vh;
    width: auto;
    transform: translate(-50%, -50%);
    cursor: zoom-in; /* マウスカーソルを＋にする */
    transition: transform 0.2s ease;
  }

  /* クリックされたら等倍表示に切り替え */
  img.zoomed {
    max-height: none;
    height: auto;
    width: auto;
    cursor: zoom-out;
    transform: translate(-50%, -50%) scale(1);
  }
</style>
</head>
<body>

<img src="images/cosmic-phase-diagram-2.png" id="diagram">

<script>
  const img = document.getElementById('diagram');
  img.addEventListener('click', () => {
    img.classList.toggle('zoomed');
  });
</script>

</body>
</html>
