<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Phase Diagram</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    height: 100%;
    overflow: hidden;
  }

  #container {
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: relative;
    touch-action: none;
  }

  #diagram {
    position: absolute;
    top: 50%;
    left: 50%;
    max-height: 100vh;
    width: auto;
    transform: translate(-50%, -50%) scale(1);
    cursor: zoom-in;
    transition: transform 0.2s ease;
    user-select: none;
  }
</style>
</head>
<body>

<div id="container">
  <img src="images/cosmic-phase-diagram-2.png" id="diagram">
</div>

<script>
 const img = document.getElementById('diagram');
const container = document.getElementById('container');

let fitScale = 1;
let offsetX = 0;
let offsetY = 0;

let dragging = false;
let startX = 0;
let startY = 0;

function fitToScreen() {
  const naturalW = img.naturalWidth;
  const naturalH = img.naturalHeight;
  const cw = container.clientWidth;
  const ch = container.clientHeight;

  fitScale = Math.min(cw / naturalW, ch / naturalH);

  offsetX = -naturalW * fitScale / 2;
  offsetY = -naturalH * fitScale / 2;

  img.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${fitScale})`;
}

img.onload = fitToScreen;
window.onresize = fitToScreen;

// ドラッグ開始
container.addEventListener('mousedown', (e) => {
  dragging = true;
  startX = e.clientX - offsetX;
  startY = e.clientY - offsetY;
});

// ドラッグ中
window.addEventListener('mousemove', (e) => {
  if (!dragging) return;

  offsetX = e.clientX - startX;
  offsetY = e.clientY - startY;

  img.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${fitScale})`;
});

// ドラッグ終了
window.addEventListener('mouseup', () => {
  dragging = false;
});

</script>

</body>
</html>
