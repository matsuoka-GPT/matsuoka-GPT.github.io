<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Cosmic Phase Diagram Viewer</title>
  <style>
    :root{
      --bg:#05070d;
      --panel:#0d1220;
      --text:#f3f6ff;
      --sub:#aab6d3;
      --line:rgba(255,255,255,0.10);
      --accent:#6ea8ff;
    }

    *{
      box-sizing:border-box;
    }

    html, body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      min-height:100%;
    }

    body{
      display:flex;
      flex-direction:column;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:10;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:14px 16px;
      background:rgba(5,7,13,0.88);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--line);
    }

    .title-wrap{
      min-width:0;
    }

    .title{
      margin:0;
      font-size:1rem;
      line-height:1.3;
      font-weight:700;
      letter-spacing:0.01em;
    }

    .subtitle{
      margin:4px 0 0;
      font-size:0.82rem;
      line-height:1.4;
      color:var(--sub);
    }

    .top-link{
      flex-shrink:0;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      color:var(--text);
      border:1px solid var(--line);
      background:rgba(255,255,255,0.04);
      border-radius:12px;
      padding:10px 12px;
      font-size:0.9rem;
      font-weight:600;
      white-space:nowrap;
    }

    .viewer-shell{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px 12px 24px;
    }

    .viewer-stage{
      width:100%;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      display:flex;
      justify-content:center;
      align-items:center;
      border-radius:18px;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.04), rgba(255,255,255,0.01) 45%, rgba(255,255,255,0) 70%);
    }

    .figure-card{
      display:inline-block;
      margin:auto;
      padding:10px;
      border-radius:18px;
      background:rgba(255,255,255,0.02);
      border:1px solid rgba(255,255,255,0.06);
      box-shadow:0 10px 30px rgba(0,0,0,0.45);
    }

    .figure-card img{
      display:block;
      height:auto;
      max-width:none;
      width:min(1600px, 96vw);
      border-radius:12px;
      background:#000;
    }

    .caption{
      padding:0 16px 24px;
      color:var(--sub);
      font-size:0.9rem;
      line-height:1.7;
      text-align:center;
    }

    .caption a{
      color:var(--accent);
      text-decoration:none;
      font-weight:600;
    }

    @media (orientation: landscape){
      .topbar{
        padding:12px 18px;
      }

      .title{
        font-size:1.02rem;
      }

      .viewer-shell{
        padding:10px 14px 18px;
      }

      .viewer-stage{
        height:calc(100vh - 92px);
      }

      .figure-card{
        padding:8px;
      }

      .figure-card img{
        width:auto;
        max-width:none;
        max-height:calc(100vh - 128px);
      }

      .caption{
        padding:0 16px 16px;
        font-size:0.85rem;
      }
    }

    @media (min-width: 769px){
      body{
        max-width:1000px;
        margin:0 auto;
      }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="title-wrap">
      <h1 class="title">Cosmic Phase Diagram of Matter</h1>
      <p class="subtitle">Temperature — Pressure — Degrees of Freedom</p>
    </div>
    <a class="top-link" href="images/cosmic-phase-diagram-2.png" target="_blank" rel="noopener">Open PDF</a>
  </header>

  <main class="viewer-shell">
    <div class="viewer-stage">
      <figure class="figure-card">
        <img src="images/cosmic-phase-diagram-2.png" alt="Cosmic Phase Diagram of Matter" />
      </figure>
    </div>
  </main>

  <div class="caption">
    Rotate your phone horizontally for a larger view.
    For zoom controls and PDF-native navigation, use
    <a href="images/cosmic-phase-diagram-2.png" target="_blank" rel="noopener">the PDF version</a>.
  </div>

</body>
</html>
