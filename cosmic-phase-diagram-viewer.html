<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Cosmic Phase Diagram Viewer</title>

<style>
:root{
  --bg:#05070d;
  --panel:#0d1220;
  --text:#f3f6ff;
  --sub:#aab6d3;
  --line:rgba(255,255,255,0.10);
  --accent:#6ea8ff;
}

*{ box-sizing:border-box; }

html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  min-height:100%;
}

body{
  display:flex;
  flex-direction:column;
}

.topbar{
  position:sticky;
  top:0;
  z-index:20;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:14px 16px;
  background:rgba(5,7,13,0.88);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}

.title{
  margin:0;
  font-size:1rem;
  font-weight:700;
}

.subtitle{
  margin:4px 0 0;
  font-size:0.82rem;
  color:var(--sub);
}

.top-actions{
  display:flex;
  gap:10px;
}

.top-link{
  text-decoration:none;
  color:var(--text);
  border:1px solid var(--line);
  background:rgba(255,255,255,0.04);
  border-radius:12px;
  padding:10px 12px;
  font-size:0.9rem;
}

.viewer-shell{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px 12px 24px;
}

.viewer-stage{
  position:relative;
  width:100%;
  display:flex;
  justify-content:center;
}

.video-card{
  position:relative;
  padding:10px;
  border-radius:18px;
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(255,255,255,0.06);
}

.video-card video,
.poster{
  width:min(1600px,96vw);
  border-radius:12px;
  display:block;
}

.poster{
  position:absolute;
  top:0;
  left:0;
}

.caption{
  padding:0 16px 24px;
  color:var(--sub);
  text-align:center;
}

</style>
</head>

<body>

<header class="topbar">
<div>
<h1 class="title">Cosmic Phase Diagram of Matter</h1>
<p class="subtitle">Temperature — Pressure — Degrees of Freedom</p>
</div>

<div class="top-actions">
<a class="top-link" href="images/cosmic-phase-diagram.mp4" target="_blank">Open Video</a>
<a class="top-link" href="images/cosmic-phase-diagram-2.png" target="_blank">Open PDF</a>
</div>
</header>

<main class="viewer-shell">
<div class="viewer-stage">

<figure class="video-card">

<img src="images/cosmic-phase-diagram-2.png" class="poster" id="poster">

<video id="cosmicVideo" muted loop playsinline preload="auto">
<source src="images/cosmic-phase-diagram.mp4" type="video/mp4">
</video>

</figure>

</div>
</main>

<div class="caption">
This animated diagram is designed for mobile viewing.
Rotate your phone horizontally for a larger view.
</div>

<script>

const video = document.getElementById("cosmicVideo");
const poster = document.getElementById("poster");

const MIN_DISPLAY_TIME = 2000; // 2秒

let startTime = Date.now();

video.addEventListener("canplaythrough", () => {

let elapsed = Date.now() - startTime;
let wait = Math.max(0, MIN_DISPLAY_TIME - elapsed);

setTimeout(() => {

poster.style.opacity = "0";
video.play();

setTimeout(()=>{ poster.style.display="none"; },400);

}, wait);

});

</script>

</body>
</html>
